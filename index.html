<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreeL Plugin Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero__eyebrow">FreeL Official Plugins</div>
        <h1>웹에서 보고, 앱에 바로 설치하는 플러그인 홈</h1>
        <p>
          공식 레지스트리의 플러그인 목록을 불러오고, FreeL 데스크톱 앱과 연동된 설치/삭제 링크를 제공합니다.
        </p>
        <div class="hero__actions">
          <a class="button button--primary" href="#plugins">플러그인 보기</a>
          <button id="open-app-btn" class="button button--ghost" type="button">앱 열기</button>
        </div>
      </header>

      <section class="config-card">
        <div>
          <h2>연결 설정</h2>
          <p>배포 환경에 맞게 레지스트리 서버 주소와 앱 프로토콜을 바꿀 수 있습니다.</p>
        </div>
        <div class="config-grid">
          <label>
            <span>Registry URL</span>
            <input id="registry-url" type="url" placeholder="https://api.example.com/plugins/registry" />
          </label>
          <label>
            <span>App Protocol</span>
            <input id="protocol-scheme" type="text" placeholder="freel" />
          </label>
        </div>
        <div class="config-actions">
          <button id="save-config-btn" class="button button--secondary" type="button">저장</button>
          <button id="reload-btn" class="button button--ghost" type="button">다시 불러오기</button>
        </div>
      </section>

      <section id="plugins" class="plugin-section">
        <div class="section-head">
          <div>
            <div class="hero__eyebrow">Registry</div>
            <h2>공식 플러그인 목록</h2>
          </div>
          <div id="status-pill" class="status-pill">불러오는 중...</div>
        </div>

        <div id="plugin-list" class="plugin-list"></div>
      </section>
    </div>

    <template id="plugin-card-template">
      <article class="plugin-card">
        <div class="plugin-card__top">
          <div>
            <div class="plugin-card__eyebrow"></div>
            <h3></h3>
          </div>
          <div class="plugin-card__version"></div>
        </div>
        <p class="plugin-card__description"></p>
        <div class="plugin-card__meta"></div>
        <div class="plugin-card__actions">
          <button class="button button--primary install-btn" type="button">앱에 설치</button>
          <button class="button button--danger uninstall-btn" type="button">앱에서 삭제</button>
          <a class="button button--ghost details-link" target="_blank" rel="noreferrer">메타데이터</a>
        </div>
      </article>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
